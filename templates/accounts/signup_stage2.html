{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Personal Details - Step 2 of 4{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <span class="badge rounded-pill bg-light text-primary mb-3">Step 2 of 4</span>
                    <h3 class="mb-2">Tell us about yourself</h3>
                    <p class="text-muted mb-0">This helps personalize your experience</p>
                </div>
                <div class="progress mb-4" style="height: 8px;">
                    <div class="progress-bar bg-success" style="width: 50%"></div>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-3">
                        <a href="{% url 'signup_stage1' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                            Continue <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
